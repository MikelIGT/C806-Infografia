<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg:         #0f1117;
      --surface:    #181c26;
      --surface2:   #1f2435;
      --border:     #2a3045;
      --border2:    #3a4260;
      --text:       #e8ecf4;
      --muted:      #6b7594;
      --accent:     #4f8ef7;
      --accent-dim: rgba(79,142,247,0.12);
      --green:      #34d17a;
      --green-dim:  rgba(52,209,122,0.12);
      --amber:      #f5a623;
      --amber-dim:  rgba(245,166,35,0.12);
      --red:        #f05252;
      --radius:     10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .hidden { display: none !important; }
    button { font-family: 'Inter', sans-serif; cursor: pointer; }

    /* MODALS */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 500;
      backdrop-filter: blur(3px);
    }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 30px;
      width: 380px;
      animation: fadeUp 0.18s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .modal-sub   { font-size: 13px; color: var(--muted); margin-bottom: 22px; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 10px 13px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px;
      font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field-error { font-size: 12px; color: var(--red); margin-top: 10px; min-height: 18px; text-align: center; }

    .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-primary {
      flex: 1; padding: 10px;
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 600; transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost {
      padding: 10px 16px;
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 13px; transition: color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--border2); }

    /* HEADER */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 56px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    .h-logo { display: flex; align-items: center; gap: 9px; }
    .h-logo .icon {
      width: 30px; height: 30px;
      background: var(--accent-dim); border: 1px solid var(--accent);
      border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .h-logo h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }

    .h-global { display: flex; align-items: center; gap: 9px; margin-left: 20px; }
    .h-global-label { font-size: 11px; color: var(--muted); }
    .h-global-bar { width: 90px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .h-global-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.5s; }
    .h-global-pct { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); }

    .h-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .h-admin-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 11px;
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-size: 12px;
      transition: color 0.15s, border-color 0.15s;
    }
    .h-admin-btn:hover { color: var(--text); border-color: var(--border2); }
    .h-admin-btn.logged { color: var(--amber); border-color: rgba(245,166,35,0.35); background: var(--amber-dim); }

    .h-save-btn {
      display: flex; align-items: center; gap: 5px; padding: 5px 12px;
      background: var(--green-dim); border: 1px solid rgba(52,209,122,0.3);
      border-radius: 6px; color: var(--green); font-size: 12px; font-weight: 600;
      transition: opacity 0.15s;
    }
    .h-save-btn:hover { opacity: 0.8; }
    .h-save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .h-icon-btn {
      width: 30px; height: 30px;
      background: none; border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, border-color 0.15s;
    }
    .h-icon-btn:hover { color: var(--text); border-color: var(--border2); }

    .save-status { font-size: 11px; color: var(--muted); }
    .save-status.ok     { color: var(--green); }
    .save-status.err    { color: var(--red); }
    .save-status.saving { color: var(--amber); }

    /* LOADING SCREEN */
    #loadingScreen {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 200;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loadingScreen p { font-size: 13px; color: var(--muted); }

    /* MAIN */
    main { max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }
    .section-label {
      font-size: 11px; font-weight: 500; color: var(--muted);
      letter-spacing: 1.2px; text-transform: uppercase; padding: 30px 0 14px;
    }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
    .s-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 18px 16px;
      cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .s-card:hover { border-color: var(--accent); background: var(--surface2); }
    .s-card-tag  { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.9px; text-transform: uppercase; margin-bottom: 8px; }
    .s-card-name { font-size: 13px; font-weight: 600; margin-bottom: 14px; line-height: 1.3; }
    .s-pct-row   { display: flex; align-items: center; gap: 8px; }
    .s-bar-wrap  { flex: 1; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .s-bar-fill  { height: 100%; border-radius: 4px; transition: width 0.5s; }
    .s-pct-num   { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; min-width: 30px; text-align: right; }

    /* DETAIL */
    .detail-top { display: flex; align-items: center; gap: 12px; padding: 26px 0 18px; }
    .back-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: 5px 12px; border-radius: 6px;
      font-size: 12px; transition: color 0.15s, border-color 0.15s;
    }
    .back-btn:hover { color: var(--text); border-color: var(--accent); }
    .detail-top h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; }

    .sub-tabs { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 16px; }
    .sub-tab {
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--muted); font-size: 12px; font-weight: 500;
      display: flex; align-items: center; gap: 6px; transition: all 0.15s;
    }
    .sub-tab:hover { border-color: var(--accent); color: var(--text); }
    .sub-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .sub-tab .tpct { font-family: 'JetBrains Mono', monospace; font-size: 10px; opacity: 0.85; }

    .prog-strip {
      display: flex; align-items: center; gap: 14px; padding: 11px 16px; margin-bottom: 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    }
    .prog-strip-label { font-size: 12px; color: var(--muted); }
    .prog-wrap { flex: 1; height: 5px; background: var(--border); border-radius: 5px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 5px; transition: width 0.4s; }
    .prog-pct  { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; min-width: 36px; text-align: right; }

    /* TASK TABLE */
    .task-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .t-head, .t-row { display: grid; align-items: center; padding: 10px 16px; }
    .t-head { background: var(--surface2); border-bottom: 1px solid var(--border); }
    .t-row  { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .t-row:last-child { border-bottom: none; }
    .t-row:hover { background: var(--surface2); }
    .th { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; text-align: center; }
    .th:first-child { text-align: left; }
    .t-name { font-size: 13px; }
    .t-cell { display: flex; align-items: center; justify-content: center; }

    .status-btn {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid var(--border); background: none;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.12s, background 0.12s, transform 0.1s;
    }
    .status-btn[data-v="done"]    { border-color: var(--green); background: var(--green-dim); }
    .status-btn[data-v="pending"] { border-color: var(--border); background: none; }
    .status-btn[data-v="na"]      { border-color: var(--muted); background: rgba(107,117,148,0.1); }
    .status-btn.editable { cursor: pointer; }
    .status-btn.editable:hover { transform: scale(1.15); }

    .dot { width: 8px; height: 8px; border-radius: 50%; display: block; }
    .dot-done    { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .dot-pending { background: transparent; border: 1.5px solid var(--muted); width: 7px; height: 7px; }
    .dot-na      { background: var(--muted); }

    .t-legend {
      display: flex; gap: 18px; align-items: center; padding: 11px 16px;
      border-top: 1px solid var(--border); background: var(--surface2);
    }
    .t-legend span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }

    /* TOAST */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 9px; padding: 11px 16px; font-size: 13px; color: var(--text);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      transform: translateY(70px); opacity: 0;
      transition: transform 0.22s, opacity 0.22s; z-index: 600;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok   { border-color: var(--green); color: var(--green); }
    #toast.err  { border-color: var(--red);   color: var(--red); }
  </style>
</head>

</header>

    <div class="task-table" id="taskTable"></div>

</main>

  // ── SUPABASE ──────────────────────────────────────
  function dbLoad() {
    return fetch(API + '?id=eq.1&select=data', { headers: HEADERS })
      .then(function (r) { return r.json(); })
      .then(function (rows) {
        if (rows && rows.length && rows[0].data && rows[0].data.groups) {
          return rows[0].data;
        }
        // Primera vez: subir datos por defecto
        return dbSave(DEFAULT_DATA).then(function () { return DEFAULT_DATA; });
      });
  }

  function dbSave(dataObj) {
    dataObj.meta.lastUpdated = new Date().toISOString();
    return fetch(API + '?id=eq.1', {
      method: 'PATCH',
      headers: HEADERS,
      body: JSON.stringify({ data: dataObj, updated_at: new Date().toISOString() })
    }).then(function (r) {
      if (!r.ok) return r.text().then(function (t) { throw new Error(t); });
      return r;
    });
  }

  // ── HELPERS ───────────────────────────────────────
  function pctColor(p) {
    if (p >= 0.75) return 'var(--green)';
    if (p >= 0.40) return 'var(--amber)';
    return 'var(--red)';
  }
  function calcGroupPct(k) {
    var subs = Object.values(DATA.groups[k].subgroups);
    return subs.reduce(function (a, v) { return a + v.pct; }, 0) / subs.length;
  }
  function calcSubPct(sub) {
    var el = sub.tasks.filter(function (t) { return t.values[0] !== 'na'; });
    if (!el.length) return 0;
    return el.filter(function (t) { return t.values[0] === 'done'; }).length / el.length;
  }
  function updateSubPct(gk, sk) {
    DATA.groups[gk].subgroups[sk].pct = Math.round(calcSubPct(DATA.groups[gk].subgroups[sk]) * 100) / 100;
  }
  function updateGlobalBar() {
    var keys = Object.keys(DATA.groups);
    var avg  = keys.reduce(function (a, k) { return a + calcGroupPct(k); }, 0) / keys.length;
    document.getElementById('hGlobalFill').style.width = (avg * 100) + '%';
    document.getElementById('hGlobalPct').textContent  = Math.round(avg * 100) + '%';
  }
  function setSaveStatus(text, cls) {
    var el = document.getElementById('saveStatus');
    el.textContent = text;
    el.className   = 'save-status ' + cls;
  }
  function markDirty() {
    if (!dirty) {
      dirty = true;
      document.getElementById('saveBtn').classList.remove('hidden');
      setSaveStatus('Cambios sin guardar', 'err');
    }
  }
  function showToast(msg, type) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'show ' + (type || '');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { el.className = ''; }, 3200);
  }

  // ── LOGIN ─────────────────────────────────────────
  function openLogin() {
    document.getElementById('loginPass').value = '';
    document.getElementById('loginError').textContent = '';
    document.getElementById('loginModal').classList.remove('hidden');
    setTimeout(function () { document.getElementById('loginPass').focus(); }, 80);
  }
  function closeLogin() {
    document.getElementById('loginModal').classList.add('hidden');
  }
  function doLogin() {
    var pass = document.getElementById('loginPass').value;
    if (pass === ADMIN_PASSWORD) {
      isAdmin = true;
      closeLogin();
      var btn = document.getElementById('adminBtn');
      btn.classList.add('logged');
      btn.textContent = '✓ Admin';
      document.getElementById('logoutBtn').classList.remove('hidden');
      if (currentSubgroup) renderTasks(currentGroup, currentSubgroup);
      showToast('Modo edición activado', 'ok');
    } else {
      document.getElementById('loginError').textContent = 'Contraseña incorrecta.';
      document.getElementById('loginPass').value = '';
      document.getElementById('loginPass').focus();
    }
  }
  function doLogout() {
    isAdmin = false;
    dirty   = false;
    var btn = document.getElementById('adminBtn');
    btn.classList.remove('logged');
    btn.textContent = '🔒 Admin';
    document.getElementById('logoutBtn').classList.add('hidden');
    document.getElementById('saveBtn').classList.add('hidden');
    setSaveStatus('', '');
    if (currentSubgroup) renderTasks(currentGroup, currentSubgroup);
    showToast('Sesión admin cerrada', '');
  }

  // ── GUARDAR EN SUPABASE ───────────────────────────
  function saveData() {
    var btn = document.getElementById('saveBtn');
    btn.disabled = true;
    setSaveStatus('Guardando…', 'saving');
    dbSave(DATA)
      .then(function () {
        dirty = false;
        btn.classList.add('hidden');
        setSaveStatus('Guardado ✓', 'ok');
        showToast('Cambios guardados en la nube ✓', 'ok');
      })
      .catch(function (e) {
        setSaveStatus('Error al guardar', 'err');
        showToast('Error: ' + e.message, 'err');
      })
      .finally(function () {
        btn.disabled = false;
      });
  }

  // ── RENDER ────────────────────────────────────────
  function render() {
    updateGlobalBar();
    renderSummary();
  }

  function renderSummary() {
    var grid = document.getElementById('summaryGrid');
    grid.innerHTML = '';
    Object.keys(DATA.groups).forEach(function (key) {
      var group = DATA.groups[key];
      var avg   = calcGroupPct(key);
      var color = pctColor(avg);
      var card  = document.createElement('div');
      card.className = 's-card';
      card.innerHTML =
        '<div class="s-card-tag">' + group.icon + ' ' + key + '</div>' +
        '<div class="s-card-name">' + group.label + '</div>' +
        '<div class="s-pct-row">' +
          '<div class="s-bar-wrap"><div class="s-bar-fill" style="width:' + (avg * 100) + '%;background:' + color + '"></div></div>' +
          '<span class="s-pct-num" style="color:' + color + '">' + Math.round(avg * 100) + '%</span>' +
        '</div>';
      card.addEventListener('click', function () { showDetail(key); });
      grid.appendChild(card);
    });
  }

  function showDetail(groupKey) {
    currentGroup = groupKey;
    var group    = DATA.groups[groupKey];
    document.getElementById('summaryView').classList.add('hidden');
    document.getElementById('detailView').classList.remove('hidden');
    document.getElementById('detailTitle').textContent = group.icon + ' ' + group.label;

    var tabsEl  = document.getElementById('subTabs');
    tabsEl.innerHTML = '';
    var subkeys = Object.keys(group.subgroups);

    subkeys.forEach(function (sk, i) {
      var sub = group.subgroups[sk];
      var tab = document.createElement('button');
      tab.className  = 'sub-tab' + (i === 0 ? ' active' : '');
      tab.dataset.sk = sk;
      tab.innerHTML  = sk + ' <span class="tpct">' + Math.round(sub.pct * 100) + '%</span>';
      tab.addEventListener('click', function () {
        document.querySelectorAll('.sub-tab').forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        renderTasks(groupKey, sk);
      });
      tabsEl.appendChild(tab);
    });

    currentSubgroup = subkeys[0];
    renderTasks(groupKey, subkeys[0]);
  }

  function showSummary() {
    document.getElementById('summaryView').classList.remove('hidden');
    document.getElementById('detailView').classList.add('hidden');
    currentGroup    = null;
    currentSubgroup = null;
    renderSummary();
    updateGlobalBar();
  }

  function renderTasks(groupKey, subKey) {
    currentSubgroup = subKey;
    var sub   = DATA.groups[groupKey].subgroups[subKey];
    var pct   = sub.pct;
    var color = pctColor(pct);

    document.getElementById('progFill').style.width      = (pct * 100) + '%';
    document.getElementById('progFill').style.background = color;
    document.getElementById('progPct').textContent       = Math.round(pct * 100) + '%';
    document.getElementById('progPct').style.color       = color;

    var cols = sub.columns;
    var tpl  = '1fr ' + cols.map(function () { return '70px'; }).join(' ');

    var html = '<div class="t-head" style="grid-template-columns:' + tpl + '">' +
      '<div class="th">Tarea</div>' +
      cols.map(function (c) { return '<div class="th">' + c + '</div>'; }).join('') +
      '</div>';

    sub.tasks.forEach(function (task, ti) {
      var cells = task.values.map(function (v, vi) {
        if (isAdmin) {
          return '<div class="t-cell">' +
            '<button class="status-btn editable" data-v="' + v + '" data-ti="' + ti + '" data-vi="' + vi + '" data-gk="' + groupKey + '" data-sk="' + subKey + '">' +
            '<span class="dot dot-' + v + '"></span>' +
            '</button></div>';
        }
        return '<div class="t-cell"><div class="status-btn" data-v="' + v + '"><span class="dot dot-' + v + '"></span></div></div>';
      }).join('');
      html += '<div class="t-row" style="grid-template-columns:' + tpl + '">' +
        '<div class="t-name">' + task.name + '</div>' + cells + '</div>';
    });

    html += '<div class="t-legend">' +
      '<span><span class="dot dot-done"></span> Completado</span>' +
      '<span><span class="dot dot-pending"></span> Pendiente</span>' +
      '<span><span class="dot dot-na"></span> N/A</span>' +
      (isAdmin ? '<span style="margin-left:auto;color:var(--accent);font-size:10px">✏ Clic para cambiar estado</span>' : '') +
      '</div>';

    document.getElementById('taskTable').innerHTML = html;
  }

  function cycleStatus(btn) {
    var gk   = btn.dataset.gk;
    var sk   = btn.dataset.sk;
    var ti   = parseInt(btn.dataset.ti, 10);
    var vi   = parseInt(btn.dataset.vi, 10);
    var task = DATA.groups[gk].subgroups[sk].tasks[ti];
    var next = CYCLE[task.values[vi]];
    task.values[vi] = next;

    btn.setAttribute('data-v', next);
    btn.querySelector('.dot').className = 'dot dot-' + next;

    updateSubPct(gk, sk);
    var pct   = DATA.groups[gk].subgroups[sk].pct;
    var color = pctColor(pct);

    document.getElementById('progFill').style.width      = (pct * 100) + '%';
    document.getElementById('progFill').style.background = color;
    document.getElementById('progPct').textContent       = Math.round(pct * 100) + '%';
    document.getElementById('progPct').style.color       = color;

    document.querySelectorAll('.sub-tab').forEach(function (tab) {
      if (tab.dataset.sk === sk) tab.querySelector('.tpct').textContent = Math.round(pct * 100) + '%';
    });

    updateGlobalBar();
    markDirty();
  }

  // ── EVENTOS ───────────────────────────────────────
  document.getElementById('adminBtn').addEventListener('click', openLogin);
  document.getElementById('loginSubmitBtn').addEventListener('click', doLogin);
  document.getElementById('loginCancelBtn').addEventListener('click', closeLogin);
  document.getElementById('loginPass').addEventListener('keydown', function (e) {
    if (e.key === 'Enter')  doLogin();
    if (e.key === 'Escape') closeLogin();
  });
  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  document.getElementById('saveBtn').addEventListener('click', saveData);
  document.getElementById('backBtn').addEventListener('click', showSummary);

  document.getElementById('taskTable').addEventListener('click', function (e) {
    var btn = e.target.closest('.status-btn.editable');
    if (btn) cycleStatus(btn);
  });

  document.querySelectorAll('.modal-overlay').forEach(function (el) {
    el.addEventListener('click', function (e) {
      if (e.target === el) el.classList.add('hidden');
    });
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay').forEach(function (m) { m.classList.add('hidden'); });
    }
  });

  // ── INIT ──────────────────────────────────────────
  dbLoad()
    .then(function (data) {
      DATA = data;
      document.getElementById('loadingScreen').classList.add('hidden');
      render();
    })
    .catch(function (err) {
      DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
      document.getElementById('loadingScreen').classList.add('hidden');
      render();
      showToast('Error cargando datos: ' + err.message, 'err');
    });

}());
